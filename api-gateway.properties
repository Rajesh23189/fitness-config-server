spring.application.name=api-gateway

server.port=8080
eureka.client.server-url.defaultZone=http://localhost:8761/eureka/

#User Services 
spring.cloud.gateway.routes[0].id=user-server
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

#Activity Services 
spring.cloud.gateway.routes[1].id=activity-server
spring.cloud.gateway.routes[1].uri=http://localhost:8085
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/activity/**

#Ai Services 
spring.cloud.gateway.routes[2].id=ai-server
spring.cloud.gateway.routes[2].uri=http://localhost:8090
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/recommendations/**